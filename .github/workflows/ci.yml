name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy src/lazyros

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          TERM: xterm-256color
          COLUMNS: "120"
          LINES: "40"
          PYTHONUNBUFFERED: "1"
        run: pytest -v --cov=lazyros --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip "packaging>=24.1" twine build
      - name: Build
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  ros-integration:
    # Live integration check against an actual ROS 2 distribution.
    # Marked continue-on-error because it depends on external container
    # availability and ROS upstream packaging — failures here should not
    # block the rest of CI.
    name: ROS 2 ${{ matrix.distro }} smoke
    runs-on: ubuntu-22.04
    needs: [test]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        distro: [humble, jazzy]
    container:
      image: ros:${{ matrix.distro }}-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap venv
        shell: bash
        # Noble (Jazzy base) ships pip via apt — `pip install --upgrade pip`
        # can't uninstall it ("RECORD file not found"). Create a venv with
        # --system-site-packages so rclpy and the rest of /opt/ros stay
        # importable, but lazyros + Textual + plotext go into an isolated
        # site-packages where pip can manage itself.
        run: |
          set -ex
          apt-get update
          apt-get install -y --no-install-recommends python3-pip python3-venv
          python3 -m venv --system-site-packages /opt/lazyros-venv
          source /opt/lazyros-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests inside ROS env
        shell: bash
        # Important: do NOT use `set -u` here. The ROS setup scripts read
        # variables that may not be defined yet (AMENT_TRACE_SETUP_FILES,
        # AMENT_PREFIX_PATH, ...) and would abort the whole step under -u.
        env:
          TERM: xterm-256color
          COLUMNS: "120"
          LINES: "40"
        run: |
          set -e
          source /opt/ros/${{ matrix.distro }}/setup.bash
          source /opt/lazyros-venv/bin/activate
          pytest -q --tb=short tests/
      - name: Headless launch smoke
        shell: bash
        env:
          TERM: xterm-256color
          COLUMNS: "120"
          LINES: "40"
        run: |
          set -e
          source /opt/ros/${{ matrix.distro }}/setup.bash
          source /opt/lazyros-venv/bin/activate
          python - <<'PY'
          import asyncio
          from lazyros.app import LazyrosApp
          from lazyros.ros.backend import RosBackend

          async def go():
              app = LazyrosApp(ros=RosBackend())
              async with app.run_test(headless=True, size=(120, 40)) as p:
                  await p.pause()
                  await p.press("q")
                  await p.pause()

          asyncio.run(go())
          print("smoke OK")
          PY
