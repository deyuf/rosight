name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/lazyros || true   # advisory until full type pass

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          TERM: xterm-256color
          COLUMNS: "120"
          LINES: "40"
        run: pytest --cov=lazyros --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip packaging twine
          pip install build
      - name: Build
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  ros-integration:
    # Live integration test against an actual ROS 2 distribution.
    name: ROS 2 ${{ matrix.distro }} smoke
    runs-on: ubuntu-22.04
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        distro: [humble, jazzy]
    container:
      image: ros:${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python deps
        shell: bash
        run: |
          apt-get update
          apt-get install -y python3-pip
          pip3 install --upgrade pip --break-system-packages || pip3 install --upgrade pip
          pip3 install -e ".[dev]" --break-system-packages || pip3 install -e ".[dev]"
      - name: Run unit tests inside ROS env
        shell: bash
        run: |
          source /opt/ros/${{ matrix.distro }}/setup.bash
          pytest -q tests/
      - name: Headless launch smoke
        shell: bash
        run: |
          source /opt/ros/${{ matrix.distro }}/setup.bash
          # Boot the app for 2 seconds in headless mode and confirm clean exit.
          timeout 5s python -c "
          import asyncio
          from lazyros.app import LazyrosApp
          from lazyros.ros.backend import RosBackend
          async def go():
              app = LazyrosApp(ros=RosBackend())
              async with app.run_test(headless=True, size=(120, 40)) as p:
                  await p.pause()
                  await p.press('q')
          asyncio.run(go())
          " || code=$?; [ "${code:-0}" -eq 0 ] || { echo "smoke failed: $code"; exit "$code"; }
