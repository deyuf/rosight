version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels: [dependencies, ci]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels: [dependencies]
    groups:
      dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "build"
          - "twine"
