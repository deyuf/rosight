<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Rosight logo">
  <title>Rosight</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5c6bc0"/>
      <stop offset="40%"  stop-color="#3949ab"/>
      <stop offset="80%"  stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1145"/>
    </linearGradient>

    <radialGradient id="centerLight" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="55%" r="75%">
      <stop offset="58%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <linearGradient id="topGloss" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#b2ebf2"/>
      <stop offset="45%"  stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#006978"/>
    </linearGradient>

    <linearGradient id="glyphGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a6b1d6"/>
    </linearGradient>

    <linearGradient id="rimBevel" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <clipPath id="bodyClip">
      <rect x="0" y="0" width="256" height="256" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#body)"/>

  <g clip-path="url(#bodyClip)">
    <rect x="0" y="0" width="256" height="256" fill="url(#vignette)"/>
    <rect x="0" y="0" width="256" height="256" fill="url(#centerLight)"/>
    <ellipse cx="128" cy="-30" rx="170" ry="115" fill="url(#topGloss)"/>

    <circle cx="128" cy="128" r="84" fill="none" stroke="#26c6da" stroke-width="24" opacity="0.06"/>
    <circle cx="128" cy="128" r="84" fill="none" stroke="#26c6da" stroke-width="16" opacity="0.10"/>
    <circle cx="128" cy="128" r="84" fill="none" stroke="#26c6da" stroke-width="11" opacity="0.16"/>

    <circle cx="128" cy="128" r="84" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
    <path d="M 50 128 A 78 78 0 0 1 206 128" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.6" stroke-linecap="round"/>
    <path d="M 206 128 A 78 78 0 0 1 50 128" fill="none" stroke="#000000" stroke-width="2" opacity="0.30" stroke-linecap="round"/>

    <circle cx="128" cy="128" r="58" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.40"/>

    <line x1="128" y1="20"  x2="128" y2="56"  stroke="#26c6da" stroke-width="14" stroke-linecap="round" opacity="0.18"/>
    <line x1="128" y1="200" x2="128" y2="236" stroke="#26c6da" stroke-width="14" stroke-linecap="round" opacity="0.18"/>
    <line x1="20"  y1="128" x2="56"  y2="128" stroke="#26c6da" stroke-width="14" stroke-linecap="round" opacity="0.18"/>
    <line x1="200" y1="128" x2="236" y2="128" stroke="#26c6da" stroke-width="14" stroke-linecap="round" opacity="0.18"/>

    <line x1="128" y1="20"  x2="128" y2="56"  stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="128" y1="200" x2="128" y2="236" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="20"  y1="128" x2="56"  y2="128" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="200" y1="128" x2="236" y2="128" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(0,4)" opacity="0.55" filter="url(#softBlur)">
      <polyline points="98,94 138,128 98,162" fill="none" stroke="#000000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="146" y="150" width="34" height="11" rx="5.5" ry="5.5" fill="#000000"/>
    </g>

    <polyline points="98,94 138,128 98,162" fill="none" stroke="url(#glyphGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="146" y="150" width="34" height="11" rx="5.5" ry="5.5" fill="url(#glyphGrad)"/>

    <path d="M 104 102 L 124 120" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

    <rect x="3" y="3" width="250" height="250" rx="53" ry="53" fill="none" stroke="url(#rimBevel)" stroke-width="1.6"/>
  </g>
</svg>
