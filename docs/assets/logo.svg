  <line x1="200" y1="128" x2="232" y2="128" stroke="#26c6da" stroke-width="6" stroke-linecap="round"/>

  <polyline points="98,96 134,128 98,160" fill="none" stroke="#e8eaf6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="142" y="150" width="32" height="10" rx="5" ry="5" fill="#e8eaf6"/>
